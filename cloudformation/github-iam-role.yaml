AWSTemplateFormatVersion: '2010-09-09'
Description: 'GitHub Actions IAM Role - Template for deploying repository-specific GitHub Actions roles that assume the shared OIDC provider'

# Stack Name: gha-role-for-co-i-on-${Environment}

# DEPLOYMENT INSTRUCTIONS:
# 1. Copy this template to your target repository
# 2. Update the ProjectName and ProjectName parameter defaults to match your repository
# 3. Optionally adjust Environment parameter if needed
# 4. Add additional managed policies or inline policies as required for your application
# 5. Deploy with: aws cloudformation create-stack --stack-name github-role-for-<repo-name> --template-body file://github-iam-role.yaml --capabilities CAPABILITY_NAMED_IAM

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Repository Configuration
        Parameters:
          - Organization
          - ProjectName
          - Environment
    ParameterLabels:
      Organization:
        default: GitHub Organization
      ProjectName:
        default: Repository Name
      Environment:
        default: Environment

Parameters:
  Organization:
    Type: String
    Description: GitHub organization name
    Default: faccomichele
    MinLength: 1
    MaxLength: 63
    AllowedPattern: ^[a-z0-9-]+$
    ConstraintDescription: Must be lowercase alphanumeric with hyphens only
  
  ProjectName:
    Type: String
    Description: Name of the GitHub repository (used for OIDC trust policy)
    Default: co-i-on
    MinLength: 1
    MaxLength: 100
    AllowedPattern: ^[a-zA-Z0-9._-]+$
    ConstraintDescription: Must be a valid GitHub repository name
  
  Environment:
    Type: String
    Description: Environment/Workspace (dev, stg, prod)
    AllowedValues:
      - dev
      - stg
      - prod
    Default: dev

# Mapping from lower to upper as CFT does not have intrinsic functions for string case conversion
Mappings:
  EnvironmentMap:
    dev:
      Upper: DEV
    stg:
      Upper: STG
    prod:
      Upper: PROD

Resources:
  # IAM role for GitHub Actions (repository-specific)
  GHARole:
    Type: AWS::IAM::Role
    Properties:
      # Role name will be auto-generated by CloudFormation with stack name prefix
      # This ensures uniqueness and follows AWS naming best practices
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 
                - 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
                - {}
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${Organization}/${ProjectName}:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        # REQUIRED: SSM parameter read policy to retrieve Terraform backend configuration
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-tf-access-${Environment}'
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-ssm-read-${Environment}'
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/terraform-core-aws-s3-artifacts-access-${Environment}'
      # Inline policy with required Terraform permissions
      Policies:
        - PolicyName: TerraformDeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 bucket permissions for bot storage
              - Sid: S3BucketManagement
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:Get*
                  - s3:Put*
                  - s3:DeleteBucketPolicy
                  - s3:List*
                  - s3:DeleteObject
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-bot-storage-${Environment}-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectName}-bot-storage-${Environment}-${AWS::AccountId}/*'
              
              # DynamoDB table permissions for chat memory and bot configs
              - Sid: DynamoDBManagement
                Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:ListTagsOfResource
                  - dynamodb:TagResource
                  - dynamodb:UpdateTable
                  - dynamodb:UpdateTimeToLive
                Resource:
                  - !Sub 'arn:aws:dynamodb:*:${AWS::AccountId}:table/${ProjectName}-*-${Environment}'

              # Lambda function permissions
              - Sid: LambdaManagement
                Effect: Allow
                Action:
                  - lambda:CreateFunction*
                  - lambda:DeleteFunction*
                  - lambda:Get*
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:TagResource
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:UpdateFunctionUrlConfig
                  - lambda:CreateEventSourceMapping
                  - lambda:UpdateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:PutFunctionCodeSigningConfig
                  - lambda:*Version
                Resource:
                  - !Sub 'arn:aws:lambda:*:${AWS::AccountId}:function:${ProjectName}-*-${Environment}*'
                  - !Sub 'arn:aws:lambda:*:${AWS::AccountId}:layer:${ProjectName}-*-${Environment}*'
                  - !Sub 'arn:aws:lambda:*:${AWS::AccountId}:event-source-mapping:*'
                  - !Sub 'arn:aws:lambda:*:*:layer:aws-otel-*'

              # API Gateway permissions
              - Sid: APIGatewayManagement
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                Resource:
                  - !Sub 'arn:aws:apigateway:*::*'
              
              # IAM role permissions for Lambda and ECS tasks
              - Sid: IAMRoleManagement
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole*
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:List*
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:TagRole
                  - iam:PassRole
                  - iam:UpdateAssumeRolePolicy
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*-${Environment}'
              
              # IAM permissions for managed policies (read-only)
              - Sid: IAMPolicyReadAccess
                Effect: Allow
                Action:
                  - iam:GetPolicy*
                  - iam:List*
                Resource:
                  - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
                  - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
              
              # CloudWatch Logs permissions for Lambda functions and API Gateway
              - Sid: CloudWatchLogsManagement
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:Describe*
                  - logs:List*
                  - logs:*agLogGroup
                  - logs:*RetentionPolicy
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:*SubscriptionFilter
                Resource:
                  - !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/aws/*/${ProjectName}-*-${Environment}*'
                  - !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group:/ecs/${ProjectName}-*-${Environment}*'
                  - !Sub 'arn:aws:logs:*:${AWS::AccountId}:log-group::log-stream:*'
              
              # X-Ray Tracing for ADOT and Grafana Cloud integration
              - Sid: XRayTracing
                Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'
              
              # SSM Parameter Store read access for data sources in Terraform
              - Sid: SSMParameterRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/manual/${Environment}/*'
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/${ProjectName}/*'

              # SSM Parameter Store write access for tool configurations and Grafana Cloud credentials
              - Sid: SSMParameterWrite
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                  - ssm:ListTagsForResource
                Resource:
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/${ProjectName}/*'

              # API Gateway V2 (HTTP API) permissions for Telegram webhook
              - Sid: APIGatewayV2Management
                Effect: Allow
                Action:
                  - apigateway:*
                Resource:
                  - !Sub 'arn:aws:apigateway:*::/apis'
                  - !Sub 'arn:aws:apigateway:*::/apis/*'
              
              # Bedrock permissions for AI model invocation (Claude Sonnet)
              - Sid: BedrockModelAccess
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:GetFoundationModel
                  - bedrock:ListFoundationModels
                Resource:
                  - !Sub 'arn:aws:bedrock:*::foundation-model/*'
              
              # ECS permissions for optional Fargate tasks (long-running workloads)
              - Sid: ECSClusterManagement
                Effect: Allow
                Action:
                  - ecs:*
                Resource:
                  - !Sub 'arn:aws:ecs:*:${AWS::AccountId}:cluster/${ProjectName}-*-${Environment}'
                  - !Sub 'arn:aws:ecs:*:${AWS::AccountId}:task-definition/${ProjectName}-*-${Environment}:*'
                  - !Sub 'arn:aws:ecs:*:${AWS::AccountId}:task/${ProjectName}-*-${Environment}/*'

              # ECR permissions for pushing, updating, and replacing container images
              - Sid: ECRImageManagement
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:Get*
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:Put*
                  - ecr:CreateRepository
                  - ecr:Describe*
                  - ecr:*agResource
                  - ecr:DeleteRepository
                  - ecr:List*
                Resource:
                  - !Sub 'arn:aws:ecr:*:${AWS::AccountId}:repository/${ProjectName}-*-${Environment}*'
              
              # SNS Topic Management for alerts and notifications
              - Sid: SNSManagement
                Effect: Allow
                Action:
                  - sns:*
                Resource:
                  - !Sub 'arn:aws:sns:*:${AWS::AccountId}:${ProjectName}-*-${Environment}'

              # Step Functions State Machine Management for workflow orchestration
              - Sid: StepFunctionsManagement
                Effect: Allow
                Action:
                  - states:*
                Resource:
                  - !Sub 'arn:aws:states:*:${AWS::AccountId}:stateMachine:${ProjectName}-*-${Environment}'
              
              # CloudWatch Synthetics Canary for monitoring
              - Sid: SyntheticsManagement
                Effect: Allow
                Action:
                  - synthetics:*
                Resource:
                  - !Sub 'arn:aws:synthetics:*:${AWS::AccountId}:canary:${ProjectName}-*-${Environment}'
              
              # Kinesis Firehose for log and metric streaming to Grafana Cloud
              - Sid: FirehoseManagement
                Effect: Allow
                Action:
                  - firehose:*
                Resource:
                  - !Sub 'arn:aws:firehose:*:${AWS::AccountId}:deliverystream/${ProjectName}-*-${Environment}'

              # CloudWatch Metric Streams for Grafana Cloud integration
              - Sid: CloudWatchMetricStreamManagement
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricStream
                  - cloudwatch:DeleteMetricStream
                  - cloudwatch:GetMetricStream
                  - cloudwatch:ListMetricStreams
                  - cloudwatch:*agResource
                Resource:
                  - !Sub 'arn:aws:cloudwatch:*:${AWS::AccountId}:metric-stream/${ProjectName}-*-${Environment}'

              # EventBridge (CloudWatch Events) Rules and Targets
              - Sid: EventBridgeManagement
                Effect: Allow
                Action:
                  - events:*
                Resource:
                  - !Sub 'arn:aws:events:*:${AWS::AccountId}:rule/${ProjectName}-*-${Environment}'

              # EC2 Security Groups for ECS tasks
              # Note: Security group ARNs must use wildcards due to EC2 resource ARN limitations
              # Actual security groups will be constrained by project/environment tags
              - Sid: EC2SecurityGroupManagement
                Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:Describe*
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:UpdateSecurityGroupRuleDescriptionsIngress
                  - ec2:UpdateSecurityGroupRuleDescriptionsEgress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource:
                  - !Sub 'arn:aws:ec2:*:${AWS::AccountId}:security-group/*'
                  - !Sub 'arn:aws:ec2:*:${AWS::AccountId}:vpc/*'
              
              # VPC and Subnet Discovery for ECS networking
              - Sid: VPCNetworkDiscovery
                Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeNetworkInterfaces
                Resource: '*'

              # Terraform state and resource discovery
              # Wildcard resource access is required for list/discovery operations that Terraform
              # uses to refresh state and detect drift.
              - Sid: ResourceDiscovery
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - dynamodb:ListTables
                  - lambda:List*
                  - iam:ListRoles
                  - logs:ListTagsForResource
                  - apigateway:GetApis
                  - ecs:ListClusters
                  - ecs:ListTaskDefinitions
                  - bedrock:ListFoundationModels
                  - ecr:GetAuthorizationToken
                  - ecr:DescribeRepositories
                  - sns:ListTopics
                  - states:ListStateMachines
                  - synthetics:DescribeCanaries
                  - firehose:ListDeliveryStreams
                  - cloudwatch:ListMetricStreams
                  - events:ListRules
                  - ec2:DescribeSecurityGroups
                  - ssm:DescribeParameters
                  - cloudwatch:ListTagsForResource
                Resource: '*'

              # Neptune Serverless permissions (deploy, update, delete)
              - Sid: NeptuneManagement
                Effect: Allow
                Action:
                  - rds:*GlobalCluster*
                  - rds:*DBSubnetGroup*
                  - rds:*DBClusterParameter*
                  - rds:*Tags*Resource*
                  - rds:AddRoleToDBCluster
                  - rds:RemoveRoleFromDBCluster
                  - rds:*DBCluster*
                  - rds:*DBInstance*
                  - rds:RestoreDBClusterFromSnapshot
                  - rds:CreateDBClusterSnapshot
                  - rds:DeleteDBClusterSnapshot
                  - rds:*agResource*
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Organization
          Value: !Ref Organization
        - Key: Environment
          Value: !Ref Environment
        - Key: RepositoryURL
          Value: !Sub 'https://github.com/${Organization}/${ProjectName}'
        - Key: Automation
          Value: CloudFormation
        - Key: RepositoryPath
          Value: cloudformation
        - Key: RepositoryFile
          Value: github-iam-role.yaml
        - Key: Description
          Value: !Sub 'IAM role for GitHub Actions in ${Organization}/${ProjectName}'
        - Key: Region
          Value: !Ref 'AWS::Region'

Outputs:
  AwsId:
    Value:
      Fn::Join:
        - ''
        - - !FindInMap [EnvironmentMap, !Ref Environment, Upper]
          - '_AWS_ID = '
          - !Ref 'AWS::AccountId'
  RoleSecret:
    Value:
      Fn::Join:
        - ''
        - - !FindInMap [EnvironmentMap, !Ref Environment, Upper]
          - '_ROLE_SECRET = '
          - Fn::Select:
              - 8
              - Fn::Split:
                  - "-"
                  - !GetAtt GHARole.Arn
